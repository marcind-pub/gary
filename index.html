<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpaloneMazurskie Gary 2026</title>
  <meta name="description" content="A simple static page with an image and countdown timer.">
  <style>
    :root {
      color-scheme: light;
      --bg: #0b0b0b;
      --text: #f5f1ea;
      --muted: rgba(245, 241, 234, 0.76);
      --panel: rgba(18, 18, 18, 0.76);
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 30%), var(--bg);
      overflow: hidden;
    }

    .wrap {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .image-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .image-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .countdown {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      padding: 16px 18px;
      border-top: 1px solid var(--border);
      background: transparent;
      backdrop-filter: blur(12px);
      text-align: center;
      z-index: 1;
    }

    .countdown-label {
      margin: 0 0 8px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #000;
    }

    .countdown-value {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #000;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.25);
    }

    .countdown-finished {
      color: #a8f0b1;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 0;
      }

      .image-stage {
        height: 100vh;
      }

      .countdown {
        padding: 14px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="image-stage" aria-label="main image">
      <img src="empty.png" alt="Main page image">
      <section class="countdown" aria-label="">
        <p class="countdown-label"></p>
        <p class="countdown-value" id="countdown">--d --h --m --s</p>
      </section>
    </section>
  </main>

  <script>
    const target = new Date('2026-06-18T07:00:00');
    const countdownElement = document.getElementById('countdown');

    function updateCountdown() {
      const now = new Date();
      const distance = target - now;

      if (distance <= 0) {
        countdownElement.textContent = '00d 00h 00m 00s';
        countdownElement.classList.add('countdown-finished');
        return;
      }

      const days = Math.floor(distance / 86400000);
      const hours = Math.floor((distance % 86400000) / 3600000);
      const minutes = Math.floor((distance % 3600000) / 60000);
      const seconds = Math.floor((distance % 60000) / 1000);

      countdownElement.textContent = `${String(days).padStart(2, '0')}d ${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
